<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ห้องเรียนแสนสนุก - ชุดความรู้ใหม่</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --font-main: 'Mali', cursive;
        }
        body {
            font-family: var(--font-main);
            background-color: #fdf2f8;
            background-image: radial-gradient(#fbcfe8 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .lesson-card { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .lesson-card:hover { transform: scale(1.05); }
        .emoji-pop { animation: pop 0.5s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.5); }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen pb-20">

<header class="bg-white p-6 shadow-md rounded-b-[3rem] text-center sticky top-0 z-50 border-b-4 border-pink-300">
    <h1 class="text-3xl font-bold text-pink-600 mb-2">🌟 ห้องเรียนแสนสนุก (ชุดใหม่)</h1>
    <div id="scoreBox" class="inline-flex items-center bg-pink-100 px-6 py-2 rounded-full border-2 border-pink-400 text-pink-700 font-bold text-xl shadow-inner transition-all duration-300">
        ✨ คะแนนสะสม: <span id="currentScore" class="ml-2">0</span>
    </div>
</header>

<main class="container mx-auto px-4 mt-8">
    <!-- แถบเลือกสัปดาห์ -->
    <div class="bg-white/80 backdrop-blur-sm p-4 rounded-3xl shadow-sm mb-8 sticky top-32 z-40 overflow-hidden">
        <div id="weekNav" class="nav-scroll flex overflow-x-auto gap-4 pb-2 px-2">
            <!-- ปุ่มสัปดาห์จะถูกสร้างที่นี่ -->
        </div>
    </div>

    <!-- หัวข้อและเนื้อหา -->
    <div class="text-center mb-10">
        <h2 id="weekTheme" class="text-2xl md:text-4xl font-bold text-indigo-700 drop-shadow-sm">
            กำลังเตรียมบทเรียน...
        </h2>
    </div>

    <div id="lessonGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6">
        <!-- การ์ดบทเรียน -->
    </div>
</main>

<!-- Quiz Modal -->
<div id="quizModal" class="hidden fixed inset-0 z-[100] bg-black/70 backdrop-blur-md flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-md rounded-[3rem] p-10 border-8 border-indigo-400 shadow-2xl relative text-center">
        <button onclick="closeQuiz()" class="absolute -top-4 -right-4 bg-red-500 text-white w-12 h-12 rounded-full text-3xl shadow-lg">&times;</button>
        <h3 id="quizTitle" class="text-2xl font-bold text-indigo-600 mb-8">ข้อไหนคือ...</h3>
        <div id="quizOptions" class="grid grid-cols-1 gap-4"></div>
    </div>
</div>

    let currentWeek = 1;
    let score = 0;
    let listenedStatus = {};
    const dummyIcons = ["🍎", "🚗", "🧸", "⚽", "🐱", "🐶", "🍦", "🍭", "🍉", "🚁", "🦋", "🍄", "🧁", "🍍", "🦁", "🐧"];

    function initNav() {
        const nav = document.getElementById('weekNav');
        nav.innerHTML = '';
        newWeekData.forEach(w => {
            const btn = document.createElement('button');
            const isActive = w.week === currentWeek;
            btn.className = `flex-shrink-0 px-6 py-2 rounded-2xl font-bold transition-all border-2 ${
                isActive ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg' : 'bg-white text-indigo-500 border-indigo-100 hover:border-indigo-300'
            }`;
            btn.innerText = `สัปดาห์ ${w.week}`;
            btn.onclick = () => { currentWeek = w.week; initNav(); renderLessons(); };
            nav.appendChild(btn);
            if(isActive) btn.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        });
    }

    function renderLessons() {
        const grid = document.getElementById('lessonGrid');
        const themeTitle = document.getElementById('weekTheme');
        grid.innerHTML = '';
        const group = newWeekData.find(w => w.week === currentWeek);
        themeTitle.innerText = `Week ${currentWeek}: ${group.theme}`;

        group.items.forEach((item, idx) => {
            const key = `w${currentWeek}i${idx}`;
            const card = document.createElement('div');
            card.className = "lesson-card bg-white p-6 rounded-[2.5rem] shadow-sm border-2 border-transparent hover:border-indigo-200 flex flex-col items-center";
            card.innerHTML = `
                <div class="text-6xl mb-4 emoji-pop">${item.icon}</div>
                <h3 class="text-xl font-bold text-gray-700 mb-6">${item.title}</h3>
                <div class="w-full space-y-2">
                    <button onclick="playVoice('${key}', '${item.story}')" class="w-full bg-blue-500 text-white py-3 rounded-2xl font-bold shadow-md active:scale-95 transition-all">🔊 ฟังเรื่องราว</button>
                    <button id="btn-${key}" onclick="openQuiz(${currentWeek}, ${idx})" class="w-full ${listenedStatus[key] ? 'bg-green-500' : 'bg-gray-300 pointer-events-none'} text-white py-3 rounded-2xl font-bold shadow-md active:scale-95 transition-all">📝 ทดสอบ</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function playVoice(key, text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'th-TH';
        msg.rate = 0.9;
        msg.onend = () => {
            listenedStatus[key] = true;
            document.getElementById(`btn-${key}`).className = "w-full bg-green-500 text-white py-3 rounded-2xl font-bold shadow-md active:scale-95 transition-all";
        };
        window.speechSynthesis.speak(msg);
    }

    function openQuiz(wNum, idx) {
        const item = newWeekData.find(w => w.week === wNum).items[idx];
        const modal = document.getElementById('quizModal');
        const optionsDiv = document.getElementById('quizOptions');
        document.getElementById('quizTitle').innerText = item.q;
        optionsDiv.innerHTML = '';

        let opts = [{ icon: item.icon, correct: true, name: item.title }];
        let dummies = dummyIcons.filter(d => d !== item.icon);
        while(opts.length < 3) {
            let rIdx = Math.floor(Math.random() * dummies.length);
            opts.push({ icon: dummies[rIdx], correct: false });
            dummies.splice(rIdx, 1);
        }
        opts.sort(() => Math.random() - 0.5);

        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = "p-4 bg-indigo-50 border-4 border-indigo-200 rounded-3xl text-6xl hover:bg-indigo-100 transition-all active:scale-90";
            b.innerHTML = o.icon;
            b.onclick = () => {
                if(o.correct) {
                    speakSimple(`เก่งมากจ้า นี่คือ ${o.name}`);
                    updateScore(10);
                    b.classList.add('bg-green-200', 'border-green-500');
                    setTimeout(closeQuiz, 1500);
                } else {
                    speakSimple("ลองดูอีกทีนะจ๊ะ");
                    b.classList.add('bg-red-200', 'border-red-500');
                }
            };
            optionsDiv.appendChild(b);
        });
        modal.classList.remove('hidden');
        speakSimple(item.q);
    }

    function speakSimple(t) {
        window.speechSynthesis.cancel();
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'th-TH';
        window.speechSynthesis.speak(m);
    }

    function updateScore(p) {
        score += p;
        document.getElementById('currentScore').innerText = score;
        const box = document.getElementById('scoreBox');
        box.classList.add('scale-125', 'bg-yellow-200');
        setTimeout(() => box.classList.remove('scale-125', 'bg-yellow-200'), 500);
    }

    function closeQuiz() { document.getElementById('quizModal').classList.add('hidden'); }

    window.onload = () => { initNav(); renderLessons(); };
</script>
